name: Release Extension

on:
    workflow_dispatch:
        inputs:
            channel:
                description: "Signing channel (unlisted or listed)"
                required: true
                default: "unlisted"
                type: choice
                options:
                    - unlisted
                    - listed
            ref:
                description: "Git ref to build from (branch, tag, or commit)"
                default: "main"
                type: string

jobs:
    check-release-tag:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.check_tag.outputs.version }}
            tag_exists: ${{ steps.check_tag.outputs.tag_exists }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
            - name: Read Manifest Version and Check Tag
              id: check_tag
              run: |
                  VERSION=$(node -p "require('./apps/extension/manifest.json').version")
                  TAG="v${VERSION}"

                  if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null; then
                      TAG_EXISTS=true
                      echo "Tag ${TAG} already exists. Skipping release workflow."
                  else
                      TAG_EXISTS=false
                      echo "Tag ${TAG} does not exist. Continuing release workflow."
                  fi

                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "tag_exists=${TAG_EXISTS}" >> "$GITHUB_OUTPUT"

    lint:
        needs: [check-release-tag]
        if: needs.check-release-tag.outputs.tag_exists != 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - run: pnpm install
            - run: pnpm lint
            - run: pnpm format:check

    test-unit:
        needs: [check-release-tag]
        if: needs.check-release-tag.outputs.tag_exists != 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - run: pnpm install -r
            - run: pnpm test

    test-e2e:
        needs: [check-release-tag]
        if: needs.check-release-tag.outputs.tag_exists != 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - run: pnpm install -r
            - name: Install Playwright Browsers
              run: pnpm --filter extension exec playwright install --with-deps
            - name: Run E2E tests
              run: xvfb-run pnpm test:e2e
            - name: Upload Playwright Report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: apps/extension/playwright-report/
                  retention-days: 15

    build-and-sign:
        needs: [check-release-tag, lint, test-unit, test-e2e]
        if: needs.check-release-tag.outputs.tag_exists != 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
            - uses: pnpm/action-setup@v5
              with:
                  version: 10
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - run: pnpm install -r

            - name: Package Extension
              run: pnpm package

            - name: Sign Extension (AMO)
              run: pnpm sign:extension
              env:
                  AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
                  AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
                  AMO_CHANNEL: ${{ inputs.channel }}

            - name: Archive Chromium Extension
              run: |
                  cd apps/extension/dist-chromium
                  zip -r ../../../extension-chrome.zip .

            - name: Upload Firefox Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: extension-firefox-xpi
                  path: apps/extension/web-ext-artifacts/*.xpi

            - name: Upload Chrome Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: extension-chrome-zip
                  path: extension-chrome.zip

            - name: Create GitHub Release and Upload Assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ needs.check-release-tag.outputs.version }}
                  name: v${{ needs.check-release-tag.outputs.version }}
                  target_commitish: ${{ inputs.ref }}
                  generate_release_notes: true
                  files: |
                      apps/extension/web-ext-artifacts/*.xpi
                      extension-chrome.zip
